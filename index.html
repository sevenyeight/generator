<script>
    const data = {
        objects: ["Corroded Drone", "Copper-Wire Golem", "Rusted Circuit-Board Altar", "Severed Robotic Limb", "Static-Infused Mask"],
        actions: ["Infuse with static", "Bind in pine resin", "Whisper into the hard drive", "Anoint with motor oil", "Etch in moonlight"],
        elements: ["Bioluminescent moss", "Storm-struck oak", "Mercury-tainted stream", "Ancient radioactive silt", "Cracked glacial ice"],
        signs: ["Sigil of the last circuit", "Elder-rune of silicon", "Void-mark of the grid", "Fractal glyph", "Iron-tooth binding"],
        atmospheres: ["Echoes of a silent city", "Ash-choked horizon", "Sun-bleached ruin", "Magnetic storm front", "Endless digital twilight"]
    };

    let currentIdea = "";

    function generate() {
        const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
        currentIdea = `Manifesting: A ${rand(data.objects)} that you must ${rand(data.actions)} using ${rand(data.elements)} marked with the ${rand(data.signs)} amidst the ${rand(data.atmospheres)}.`;
        document.getElementById('output').innerText = currentIdea;
    }

    function exportIdea() {
        if (!currentIdea) return alert("Generate an idea first, initiate.");
        
        const blob = new Blob([currentIdea], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        
        a.href = url;
        a.download = 'Esoteric_Manifestation.txt';
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    }
</script>
<button onclick="exportIdea()">> ARCHIVE TO STORAGE</button>
